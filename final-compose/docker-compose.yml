services:
  nginx:
    image: nginx
    container_name: nginx-server
    ports:
      - "1234:80"
    volumes:
      - "./nginx/nginx.conf:/etc/nginx/nginx.conf"
    depends_on:
      - spring
      - fastapi
  
  spring:
    build: ./spring
    container_name: spring-server
    depends_on:
      - mysql
  
  fastapi:
    build: ./fastapi
    container_name: fastapi-server
    depends_on:
      - mysql

  mysql:
    image: mysql:8.0
    container_name: mysql-server
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: 123456
    volumes:
      - C:/server/mysql-data:/var/lib/mysql
      
